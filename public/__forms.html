<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Netlify Form Definitions</title></head>
<body>
  <!-- Workers Comp Quote Form — mirrors index.html form fields for Netlify form detection -->
  <form name="workers-comp-quote" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="workers-comp-quote">
    <input type="text" name="bot-field">
    <input type="text" name="business_name">
    <input type="text" name="trade">
    <input type="number" name="years_in_business">
    <input type="text" name="owner_name_0">
    <input type="date" name="owner_dob_0">
    <input type="number" name="owner_pct_0">
    <input type="text" name="owner_name_1">
    <input type="date" name="owner_dob_1">
    <input type="number" name="owner_pct_1">
    <input type="text" name="owner_name_2">
    <input type="date" name="owner_dob_2">
    <input type="number" name="owner_pct_2">
    <input type="text" name="owner_name_3">
    <input type="date" name="owner_dob_3">
    <input type="number" name="owner_pct_3">
    <input type="number" name="num_employees">
    <input type="text" name="annual_payroll">
    <input type="text" name="classification_codes">
    <input type="radio" name="prior_losses" value="yes">
    <input type="radio" name="prior_losses" value="no">
    <textarea name="prior_losses_detail"></textarea>
    <input type="text" name="current_carrier">
    <input type="date" name="policy_expiration">
    <input type="tel" name="phone">
    <input type="email" name="email">
    <button type="submit">Get My Quote</button>
  </form>
</body>
</html>
